name: CI

# Pull request'lerde ve main'e push'larda çalışır.
# Hızlı sinyal için ESLint + Vitest + typecheck; build job'u ayrı çünkü
# Prisma client + Next compile birlikte ~3-4 dk sürüyor, lint ondan
# bağımsız feedback verebiliyor.
on:
  push:
    branches: [main]
  pull_request:

# Aynı branch'e iki PR push gelirse eski run'ı iptal et — ücretsiz CI
# dakikası tüketmemek için.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      # `--ignore-scripts` postinstall'taki `prisma generate`'i atlar —
      # lint için DB veya schema'ya gerek yok, sadece tsx/jsx parse.
      - run: npm ci --ignore-scripts
      - run: npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npm run test

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      # Typecheck Prisma client type'larına ihtiyaç duyuyor; postinstall
      # `prisma generate`'i çalıştırır. DB bağlantısı GEREKMİYOR — generate
      # sadece schema.prisma'yı okuyor.
      - run: npm ci
      - run: npx tsc --noEmit

  build:
    name: Next build
    runs-on: ubuntu-latest
    # Build, schema'yı DB'ye push etmeyi gerektirir (package.json:build
    # script'ine bak). PR akışında DB yok — bunun yerine sadece compile'ı
    # doğrulamak için BUILD_ONLY=1 kontrolü yapacak şekilde script'i
    # esnek tutmak yerine burada generate + next build'i ayrı çalıştırıyoruz.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npx next build
        env:
          # Build sırasında bazı modüller env okuyor (sitemap, seo). PR
          # akışında gerçek değer yok, dummy ver — runtime'da production'da
          # Vercel kendi env'ini enjekte ediyor.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXTAUTH_URL: https://ci.invalid
          NEXTAUTH_SECRET: ci-build-only-not-a-real-secret-please-rotate
          NEXT_PUBLIC_APP_URL: https://ci.invalid
          # `prisma db push` adımını skip — schema'yı DB'ye yazmayı build
          # script'inden çıkarmak yerine, bu workflow `next build`'i
          # doğrudan çağırıyor (yukarıda).
          SKIP_DB_PUSH: '1'

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    # smoke.spec.ts: TR/EN render, robots, sitemap, /admin/login redirect,
    # cron auth, rate limit. DB seed'ine bağımlı değil — boş DB'de geçer.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ['5432:5432']
        # GitHub Actions service container'ları için healthcheck:
        # next dev `prisma client` ilk query'sini atana kadar postgres'in
        # gerçekten ayakta olduğunu garanti etmek için.
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Şema'yı boş test DB'sine pushla — seed YOK (smoke testleri boş
      # state'te çalışacak şekilde yazılmış).
      - run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      # Playwright Chromium binary'sini cache'lemek istenirse ayrı cache
      # action gerekir; smoke seti küçük, her run'da fresh install OK.
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-e2e-only-not-a-real-secret
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          # CRON_SECRET set EDİLMİYOR — smoke testlerinden biri "secret
          # yokken /api/cron/* 401 dönmeli" davranışını doğruluyor.
          CI: 'true'
      # Test düşerse trace/screenshot/log'ları artifact olarak yükle —
      # PR yorumundan tıklanabilir, lokalde reproduce gerekmiyor.
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
